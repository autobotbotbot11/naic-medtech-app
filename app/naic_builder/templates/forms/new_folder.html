<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Folder | {{ app_title }}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e5d52'/%3E%3Cpath d='M9 16h14M16 9v14' stroke='%23fffdf9' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', path='new-form.css') }}">
</head>
<body>
  <main class="new-form-shell">
    <header class="new-form-topbar panel">
      <div class="brand-copy">
        <p class="eyebrow">New Folder</p>
        <h1>{{ app_title }}</h1>
        <p class="panel-copy">Create an empty folder first when you want the library structure ready before the forms inside it.</p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-button" href="/forms">Back to Library</a>
      </div>
    </header>

    <form class="panel form-flow-card single-flow-card" action="/folders/new" method="post" novalidate>
      <div class="section-head">
        <p class="eyebrow">Folder setup</p>
        <h2>Name and place it</h2>
        <p class="panel-copy">Keep it at the top level, or place it inside an existing folder.</p>
      </div>

      {% if error_message %}
      <div class="inline-error" role="alert">{{ error_message }}</div>
      {% endif %}

      <label class="field-stack">
        <span>Folder name</span>
        <input type="text" name="name" placeholder="Example: Rapid Tests" value="{{ folder_name }}" required>
      </label>

      <label class="field-stack">
        <span>Place it inside</span>
        <select name="parent_node_key">
          <option value="" {% if not selected_parent_key %}selected{% endif %}>Top level</option>
          {% for container in container_options %}
          <option value="{{ container.node_key }}" {% if container.node_key == selected_parent_key %}selected{% endif %}>{{ container.path_label }}</option>
          {% endfor %}
        </select>
      </label>

      <div class="single-flow-actions">
        <button class="primary-button" type="submit">Create folder</button>
      </div>
    </form>
  </main>
</body>
</html>
