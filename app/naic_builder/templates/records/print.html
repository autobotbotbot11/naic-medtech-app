<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print Record | {{ document.form_name }}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e5d52'/%3E%3Cpath d='M9 16h14M16 9v14' stroke='%23fffdf9' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', path='print.css') }}">
</head>
<body class="print-density-{{ document.print_config.density }}" style="--accent: {{ document.print_config.accent_color }}">
  {% from "records/_print_document.html" import render_print_page %}
  {% set record_meta = document["record"] or {} %}

  <main class="print-shell">
    <div class="print-toolbar">
      <div class="print-toolbar-copy">
        <p class="print-eyebrow">Print preview</p>
        <p>{{ document.form_name }}</p>
      </div>
      <div class="print-toolbar-actions">
        <a class="print-link" href="/records/{{ record_meta['id'] }}">Back</a>
        <button class="print-button" type="button" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>

    {{ render_print_page(document) }}
  </main>
</body>
</html>
