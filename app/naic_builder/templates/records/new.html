<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Record | {{ app_title }}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e5d52'/%3E%3Cpath d='M9 16h14M16 9v14' stroke='%23fffdf9' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', path='library.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='records.css') }}">
</head>
<body>
  <main class="library-shell record-shell">
    <header class="library-topbar panel">
      <div class="brand-copy">
        <p class="eyebrow">Records</p>
        <h1>Start a new record</h1>
        <p class="panel-copy">Choose the form first, then the medtech can enter the result in the next screen.</p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-button" href="/records">Back to records</a>
      </div>
    </header>

    <section class="panel records-main">
      {% if error_message %}
      <div class="error-banner">{{ error_message }}</div>
      {% endif %}

      <form method="post" action="/records/new" class="record-entry-form">
        <div class="record-basics-grid">
          <label class="entry-field">
            <span>Form</span>
            <select name="form_slug" required>
              <option value="">Choose a form</option>
              {% for form in form_choices %}
              <option value="{{ form.slug }}" {% if form.slug == selected_form_slug %}selected{% endif %}>
                {{ form.form_path_label }}
              </option>
              {% endfor %}
            </select>
          </label>

          <label class="entry-field">
            <span>Patient name</span>
            <input type="text" name="patient_name" value="{{ patient_name }}" placeholder="Optional for now">
          </label>

          <label class="entry-field">
            <span>Case number</span>
            <input type="text" name="case_number" value="{{ case_number }}" placeholder="Optional for now">
          </label>
        </div>

        <div class="entry-actions">
          <a class="ghost-button" href="/records">Cancel</a>
          <button class="primary-button" type="submit">Create draft</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
