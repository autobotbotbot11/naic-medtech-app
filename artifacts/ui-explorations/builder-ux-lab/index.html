<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Builder UX Lab | Container Field</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="lab-shell">
    <header class="lab-topbar" aria-label="Builder UX Lab header">
      <div class="brand-mark">N</div>
      <div>
        <p class="eyebrow">Builder UX Lab</p>
        <h1>Container and field builder</h1>
      </div>
      <div class="topbar-actions">
        <button class="ghost" type="button" data-action="toggle-inspector">Inspector</button>
        <button class="primary" type="button">Save prototype</button>
      </div>
    </header>

    <section class="lab-note" aria-label="Prototype goal">
      <strong>Pass 03</strong>
      <span>Test the simplest content model: Container and Field only. No section/group decision while building.</span>
    </section>

    <div class="builder-frame">
      <aside class="outline-panel" aria-label="Form outline">
        <div class="panel-head">
          <p class="eyebrow">Form</p>
          <h2>Blood Bank</h2>
        </div>
        <nav id="outlineList" class="outline-list" aria-label="Content blocks"></nav>
        <button class="add-container" type="button" data-action="add-root-container">+ Add container</button>
      </aside>

      <section class="work-canvas" aria-label="Content editor">
        <div id="contentEditor"></div>
      </section>

      <aside id="inspectorPanel" class="inspector-panel" aria-label="Selected item inspector">
        <div class="panel-head">
          <p class="eyebrow">Inspector</p>
          <h2>Details</h2>
        </div>
        <div id="inspectorContent"></div>
      </aside>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
